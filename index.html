<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miboga - Tu boga digital para el BCRA</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 620px; margin: 40px auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: #0056b3; color: white; padding: 20px; text-align: center; }
        h1 { margin: 0; font-size: 1.8rem; }
        .content { padding: 30px; }
        input[type="text"] { width: 100%; padding: 14px; font-size: 1.1rem; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
        button:hover { background: #218838; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; min-height: 120px; white-space: pre-wrap; line-height: 1.5; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .warning { background: #fff3cd; border: 1px solid #ffeaa7; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
        .info { font-size: 0.95rem; color: #666; margin-top: 25px; }
        .loading { color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🇦🇷 miboga</h1>
            <p>Tu boga digital para consultar el BCRA</p>
        </header>
        <div class="content">
            <h2>Consultá tu situación crediticia gratis</h2>
            <p>Ingresá tu DNI o CUIT (sin puntos ni guiones)</p>
            
            <input type="text" id="identificacion" placeholder="Ej: 20123456789 o 12345678" maxlength="11">
            <button id="btnConsultar" onclick="consultar()">Consultar ahora</button>
            
            <div id="result"></div>
            
            <div class="info">
                • Fuente oficial: Central de Deudores del BCRA<br>
                • Consulta pública y gratuita<br>
                • No guardamos tus datos permanentemente
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://jubilant-octo-happiness.onrender.com/chat";

        async function consultar() {
            const input = document.getElementById("identificacion").value.trim();
            const resultDiv = document.getElementById("result");
            const button = document.getElementById("btnConsultar");

            if (!input) {
                resultDiv.innerHTML = `<p class="error">Por favor ingresá tu DNI o CUIT.</p>`;
                return;
            }

            button.disabled = true;
            button.textContent = "Consultando...";
            resultDiv.innerHTML = `<p class="loading">Consultando al BCRA...</p>`;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ identificacion: input, channel: "web" })
                });

                const data = await response.json();

                if (response.ok && data.response) {
                    let cssClass = "info";
                    if (data.situacion === 1) cssClass = "success";
                    if (data.bcra_status !== "success") cssClass = "warning";

                    resultDiv.innerHTML = `<div class="${cssClass}">${data.response}</div>`;
                } else {
                    // Backend returned error status or malformed response
                    resultDiv.innerHTML = `<p class="error">El sistema del BCRA está temporalmente inestable.<br>Ya me estoy ocupando — probá de nuevo en 10-15 segundos.</p>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<p class="error">No pudimos conectar con el servidor en este momento.<br>Probá de nuevo en unos segundos.</p>`;
            } finally {
                button.disabled = false;
                button.textContent = "Consultar ahora";
            }
        }

        // Allow pressing Enter
        document.getElementById("identificacion").addEventListener("keypress", function(e) {
            if (e.key === "Enter") consultar();
        });
    </script>
</body>
</html>
